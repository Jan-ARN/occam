<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="occam — anti-slop code review for Claude Code">
  <defs>
    <!-- dusk sky -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#0F1C26"/>
      <stop offset="0.45" stop-color="#1C3445"/>
      <stop offset="0.78" stop-color="#2F4D63"/>
      <stop offset="1"    stop-color="#456A82"/>
    </linearGradient>
    <!-- warm setting-sun glow low on the horizon -->
    <radialGradient id="sun" cx="0.72" cy="0.92" r="0.55">
      <stop offset="0"   stop-color="#C79A5E" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="#A87E54" stop-opacity="0.22"/>
      <stop offset="1"   stop-color="#A87E54" stop-opacity="0"/>
    </radialGradient>
    <!-- beacon glow -->
    <radialGradient id="beaconGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F0C880" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#F0C880" stop-opacity="0"/>
    </radialGradient>
    <!-- the razor: a single clean beam of beacon light -->
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#F0C880" stop-opacity="0"/>
      <stop offset="0.5"  stop-color="#F0C880" stop-opacity="0.55"/>
      <stop offset="1"    stop-color="#F3ECDB" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9FBBCD" stop-opacity="0"/>
      <stop offset="1" stop-color="#9FBBCD" stop-opacity="0.16"/>
    </linearGradient>
    <clipPath id="frame"><rect width="1200" height="300" rx="0"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="300" fill="url(#sky)"/>
    <rect width="1200" height="300" fill="url(#sun)"/>

    <!-- faint stars -->
    <g fill="#DCE6EE">
      <circle cx="140" cy="48"  r="1.1" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="5s" repeatCount="indefinite"/></circle>
      <circle cx="320" cy="30"  r="0.9" opacity="0.5"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="6.5s" repeatCount="indefinite"/></circle>
      <circle cx="520" cy="60"  r="1.0" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="4.2s" repeatCount="indefinite"/></circle>
      <circle cx="240" cy="90"  r="0.8" opacity="0.4"/>
      <circle cx="960" cy="40"  r="1.1" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="5.8s" repeatCount="indefinite"/></circle>
      <circle cx="1080" cy="70" r="0.9" opacity="0.45"/>
      <circle cx="700" cy="36"  r="0.8" opacity="0.4"/>
      <circle cx="430" cy="84"  r="0.8" opacity="0.4"/>
    </g>

    <!-- the razor beam: one clean line from the beacon, slicing the haze -->
    <g opacity="0.0">
      <animate attributeName="opacity" values="0;1;1" dur="2.6s" begin="0.3s" fill="freeze" keyTimes="0;0.7;1"/>
      <polygon points="720,194 1200,150 1200,178 720,200" fill="url(#beam)" opacity="0.5"/>
      <rect x="720" y="195.5" width="480" height="1.3" fill="url(#beam)"/>
    </g>

    <!-- ridge 4: farthest, most atmospheric -->
    <path d="M0,196 L150,150 L300,182 L470,132 L640,176 L820,138 L1000,178 L1200,150 L1200,300 L0,300 Z"
          fill="#3E6076" opacity="0.45"/>
    <!-- ridge 3 -->
    <path d="M0,224 L180,176 L360,214 L540,162 L760,210 L980,168 L1200,206 L1200,300 L0,300 Z"
          fill="#314F66" opacity="0.7"/>
    <!-- drifting mist band -->
    <g opacity="0.7">
      <rect x="-200" y="206" width="1600" height="60" fill="url(#mist)"/>
      <animateTransform attributeName="transform" type="translate" values="-40 0; 40 0; -40 0" dur="22s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>
    </g>
    <!-- ridge 2 -->
    <path d="M0,252 L220,200 L420,246 L620,194 L840,244 L1040,202 L1200,240 L1200,300 L0,300 Z"
          fill="#243F52" opacity="0.9"/>
    <!-- ridge 1: front, darkest -->
    <path d="M0,300 L0,266 L160,230 L340,272 L520,224 L720,270 L920,226 L1120,268 L1200,246 L1200,300 Z"
          fill="#152834"/>

    <!-- beacon on the peak — the watch light -->
    <g transform="translate(720,194)">
      <circle r="22" fill="url(#beaconGlow)">
        <animate attributeName="r" values="14;26;14" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" keyTimes="0;0.5;1"/>
        <animate attributeName="opacity" values="0.45;0.95;0.45" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <circle r="2.6" fill="#F3ECDB"/>
      <circle r="2.6" fill="#F0C880">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="3.2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- title block, lower-left -->
    <rect x="82" y="116" width="54" height="4" rx="2" fill="#C79A5E"/>
    <text x="80" y="172" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="700" fill="#F3ECDB" letter-spacing="1">occam</text>
    <text x="84" y="204" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#A9C5D6" letter-spacing="3.5">ANTI-SLOP CODE REVIEW · FOR CLAUDE CODE</text>
    <text x="84" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-style="italic" fill="#C79A5E" letter-spacing="0.4">cut what the change didn’t need.</text>
  </g>
</svg>
